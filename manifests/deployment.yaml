apiVersion: apps/v1
kind: Deployment
metadata:
  name: toDoApp-deployment
  namespace: color-app
  labels:
    app: color-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: color-app
  template:
    metadata:
      labels:
        app: color-app
    spec:
      containers:
      - name: color-app
        image: nimesh25/colorchange-flask:8
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 5000
